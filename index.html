<!DOCTYPE html>
<html lang="bg">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WW2 Tactical Arena</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header class="header">
        <h1>⚔️ WW2 Tactical Arena</h1>
        <p>Командвай войника си и унищожи враговете</p>
    </header>

    <main class="main">
        <section class="game-container">
            <div id="game"></div>
        </section>

        <aside class="sidebar">
            <div class="card">
                <h2>📊 Статус</h2>
                <p id="status">Твой ред</p>
            </div>

            <div class="card">
                <h2>🎮 Контрол</h2>
                <button onclick="resetGame()">🔄 Рестарт</button>
            </div>

            <div class="card">
                <h2>📘 Инструкции</h2>
                <ul>
                    <li>Кликни съседна клетка</li>
                    <li>Убий враговете</li>
                    <li>Избягвай да те хванат</li>
                </ul>
            </div>
        </aside>
    </main>

    <footer class="footer">
        <p>WW2 Game • HTML / CSS / JS</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
